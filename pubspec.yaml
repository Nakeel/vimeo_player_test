publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  vimeo_video_player: ^1.0.3
  flutter_bloc: ^8.1.5
  go_router: ^14.0.0
  get_it: ^7.7.0
  flutter_screenutil: ^5.9.3
  equatable: ^2.0.5
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
